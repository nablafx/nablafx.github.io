<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Jerry · Software</title>

  <!-- Bootstrap + custom style (same visual language) -->
  <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css" />
  <link rel="stylesheet" type="text/css" href="css/style.css" />

  <!-- Same icon / font setup -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@chinese-fonts/zqfs@2.0.1/dist/ZhuqueFangsong-Regular/result.min.css" />

  <style>
    :root {
      --bg: #faf9f7;
      --fg: #2c2c2c;
      --fg-muted: #6b6b6b;
      --border-subtle: #e0ded8;
      --accent-soft: #f1ede4;
      --highlight: #b4462e;
      --link-soft: #4a4a4a;
      --radius-sm: 12px;
      --radius-md: 18px;
      --transition: 0.2s ease;
    }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: var(--fg);
      margin: 0;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* No big card — just a clean container */
    .software-showcase {
      max-width: 780px;
      width: 100%;
      padding: 2.2rem 2rem;
    }

    /* header with same zh font spirit */
    .page-title {
      font-family: 'Zhuque Fangsong (technical preview)', 'Times New Roman', serif;
      font-size: 2.6rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: #3e3a35;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .page-title .zh {
      font-size: 2.8rem;
      line-height: 1;
    }

    .subhead {
      font-size: 0.9rem;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
      border-left: 3px solid #d9ceb8;
      padding-left: 1rem;
      font-weight: 450;
    }

    /* ---------- software list ---------- */
    .software-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      min-height: 70vh;
    }

    /* Each row: minimalist but with refined spacing */
    .software-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.2rem 1.2rem;
      background: transparent;
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition), border-color var(--transition);
      border-radius: var(--radius-sm);
    }

    .software-item:last-child {
      border-bottom: none;
    }

    .software-item:hover {
      background: rgba(245, 242, 235, 0.7);
      border-bottom-color: #d6cfc0;
    }

    /* App icon on the right */
    .software-icon {
      order: 2;
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #f4efe6;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.03);
      transition: all 0.2s;
      overflow: hidden;
    }

    .software-item:hover .software-icon {
      background: #fffef9;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
    }

    .software-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 18px;
    }

    /* Placeholder styling for when image is missing */
    .software-icon .placeholder-img {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #e8e0d3 0%, #f2ede4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b7a68b;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Text block (left side) */
    .software-info {
      order: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .app-name {
      font-size: 1.2rem;
      font-weight: 550;
      letter-spacing: -0.2px;
      color: #2f2c26;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .app-desc {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--fg-muted);
      max-width: 90%;
      text-align: left;
      padding-right: 0.2rem;
    }

    /* Action row: download button placed harmoniously below description */
    .app-actions {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.2rem;
    }

    /* Elegant download button */
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem;
      background: #faf7f2;
      border: 1px solid #d9d0bd;
      border-radius: 20px;
      color: #5e5544;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: #f0ebe0;
      border-color: #c7b99e;
      color: #3a3328;
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
    }

    .download-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .download-btn .btn-label {
      font-size: 0.8rem;
    }

    /* Alternative subtle text link */
    .subtle-link {
      font-size: 0.78rem;
      color: #9b8e7a;
      text-decoration: none;
      border-bottom: 1px dotted #c7bbaa;
      transition: color 0.2s, border-color 0.2s;
      padding-bottom: 1px;
    }

    .subtle-link:hover {
      color: #5e4e3a;
      border-bottom-color: #b4462e;
    }

    /* back link */
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 2.2rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--fg-muted);
      text-decoration: none;
      border-bottom: 1px dashed #ccc6b8;
      padding-bottom: 2px;
      transition: color 0.2s;
    }

    .back-home:hover {
      color: #2f2a22;
      border-bottom-color: #b4462e;
    }

    /* responsive */
    @media (max-width: 550px) {
      .software-showcase {
        padding: 1.8rem 1.2rem;
      }
      .software-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }
      .software-icon {
        order: 0;
        align-self: flex-end;
      }
      .app-desc {
        max-width: 100%;
      }
      .software-info {
        width: 100%;
      }
      .app-actions {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
<div class="software-showcase">

  <!-- subtle chinese name echo -->
  <div class="page-title">
    <span>Software</span>
  </div>
  <div class="subhead">For smarter research and life</div>

  <!-- Software list -->
  <div class="software-list">

    <!-- Item 1 : Tex Toolkit -->
    <div class="software-item">
      <div class="software-info">
        <div class="app-name">
          <span>Tex Toolkit</span>
          <span style="font-size:0.7rem; background:#ede7db; padding:0.2rem 0.7rem; border-radius:20px; color:#5e5544;">Desktop</span>
          <span style="font-size:0.7rem; background:#ede7db; padding:0.2rem 0.7rem; border-radius:20px; color:#5e5544;">Researcher</span>
          <span style="font-size:0.7rem; background:#ede7db; padding:0.2rem 0.7rem; border-radius:20px; color:#5e5544;">Utility</span>
        </div>
        <div class="app-desc">
            Handly toolkit for tex writing. Reference and assets manamgement, more to come
        </div>
        <div class="app-actions">
          <a href="https://github.com/nablafx/textoolset/releases/" target="_blank" class="download-btn" aria-label="Download MindGarden">

              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span class="btn-label">Download</span>
          </a>
          <a href="https://github.com/nablafx/textoolset" target="_blank" class="subtle-link">View source ↗</a>
        </div>
      </div>

      <div class="software-icon">
        <img src="assets/resources/textookit.png" alt="MindGarden icon" 
             onerror="this.style.display='none'; this.parentNode.querySelector('.placeholder-img').style.display='flex';" />
        <div class="placeholder-img" style="display:none;">MG</div>
      </div>
    </div>



  </div> <!-- end software-list -->

  <!-- back to main page -->
  <a href="index.html" class="back-home">
    <span>←</span> back to jerry
  </a>

  <!-- tiny footer note -->
  <div style="margin-top: 1.8rem; font-size: 0.7rem; color: #b7ad9a; display: flex; justify-content: flex-end;">
    <span>© 2026 Fu Zhang · software</span>
  </div>
</div>

<!-- Bootstrap JS for any potential collapse, but not needed here. Included for consistency -->
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
